# Pre-commit hooks for reportHanter.
#
# Mirrors the `make all-checks` target (ruff format-check + lint, mypy)
# so that the same checks run automatically on `git commit`.
#
# Install once after cloning:
#   pip install pre-commit
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Hooks are pinned to the versions used in development; update together
# with the project dependencies when upgrading.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match the ruff version declared in pyproject.toml (>=0.4).
    rev: v0.14.11
    hooks:
      # Linting: equivalent to `ruff check reporthanter tests`
      - id: ruff
        args: [--fix]
      # Formatting: equivalent to `ruff format reporthanter tests`
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pandas-stubs
          - types-PyYAML
        args: [--ignore-missing-imports]